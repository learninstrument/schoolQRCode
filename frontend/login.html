<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - NBTE Certificate System">
    <title>Admin Login — NBTE</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --green-dark: #1a6b3c;
            --green: #228B22;
            --green-glow: rgba(34, 139, 34, 0.2);
            --bg-body: #f4f7f4;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .login-logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: contain;
            margin-bottom: 1rem;
        }
        .login-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--green-dark);
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 2rem;
        }
        .form-control {
            background: #f8faf8;
            border: 1px solid #d4e5d4;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px var(--green-glow);
            background: #fff;
        }
        .btn-login {
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: var(--green-dark);
            transform: translateY(-1px);
        }
        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="../backend/images/nbte-logo.jpeg" alt="NBTE Logo" class="login-logo">
        <h1 class="login-title">NBTE Admin Portal</h1>
        <p class="login-subtitle">Sign in to manage certificates</p>

        <div class="alert-error" id="error-msg"></div>

        <form id="login-form">
            <div class="mb-3 text-start">
                <label class="form-label text-secondary fw-semibold small">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-secondary fw-semibold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" required>
                    <button class="btn btn-outline-secondary border" type="button" id="togglePassword" style="border-color: #d4e5d4 !important;">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btn-submit">
                <span>Sign In</span>
                <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>
        </form>
    </div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const btn = document.getElementById('btn-submit');

        if (!username || !password) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing In...';
        errorMsg.style.display = 'none';

        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        try {
            const res = await fetch('../backend/api/login.php', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = 'admin.html';
            } else {
                errorMsg.textContent = data.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Sign In</span><i class="bi bi-box-arrow-in-right ms-2"></i>';
            }
        } catch (err) {
            errorMsg.textContent = 'Connection error. Check backend.';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<span>Sign In</span><i class="bi bi-box-arrow-in-right ms-2"></i>';
        }
    });

    // Password visibility toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        if (type === 'password') {
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        } else {
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        }
    });
</script>

</body>
</html>
